# XcodeGen project specification
# Generate with: make gen   (requires `brew install xcodegen` on Mac)
name: LivePhotoMaker
options:
  bundleIdPrefix: jp.example
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.10"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    SWIFT_STRICT_CONCURRENCY: complete

configs:
  Debug: debug
  Release: release

configFiles:
  Debug: Config/Debug.xcconfig
  Release: Config/Release.xcconfig

targets:
  LivePhotoMaker:
    type: application
    platform: iOS
    sources:
      - App
      - Features
      - Services
      - Models
      - Extensions
      - Resources
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: Live Photo Maker
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        LSRequiresIPhoneOS: true
        UILaunchScreen:
          UIColorName: ""
        NSPhotoLibraryUsageDescription: "動画の読み込みとLive Photoの保存のために写真ライブラリへアクセスします。"
        NSPhotoLibraryAddUsageDescription: "作成したLive Photoを写真ライブラリへ保存します。"
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIRequiredDeviceCapabilities:
          - armv7
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: jp.example.livephotomaker
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  LivePhotoMakerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests/LivePhotoMakerTests
    dependencies:
      - target: LivePhotoMaker
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: jp.example.livephotomaker.tests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  LivePhotoMaker:
    build:
      targets:
        LivePhotoMaker: all
        LivePhotoMakerTests: [test]
    test:
      config: Debug
      targets:
        - LivePhotoMakerTests
    run:
      config: Debug
    archive:
      config: Release
